<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Christmas Sled VR</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="hud">
      <div class="title">Christmas Sled VR — Roomscale</div>
      <div id="stats" class="stats">
        <div><b>Health</b>: <span id="health">3</span></div>
        <div><b>Difficulty</b>: <span id="difficulty">Easy</span></div>
        <div><b>Distance</b>: <span id="distance">0</span> m</div>
      </div>
      <div class="hint">
        Roomscale: move around on the <b>2m × 2m</b> sled platform to dodge targeted tiles (now <b>6</b> tiles).
      </div>
      <div class="hint subtle">
        Click <b>Enter VR</b> to play. WebXR requires HTTPS or localhost (see README).
      </div>
    </div>
    <div id="loading">Enter VR to start</div>
    <canvas id="c"></canvas>

    <script type="module" src="./main.js"></script>
  </body>
</html>
