<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta
      name="description"
      content="DOWN — a VR descent game for the immersive web. Dodge, drop, survive."
    />
    <title>DOWN — VR Descent</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23030308'/%3E%3Cpath d='M16 26 6 14h6V6h8v8h6z' fill='none' stroke='%2329f3ff' stroke-width='2'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        --cyan: #29f3ff;
        --magenta: #ff3df2;
        --ink: #030308;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--ink);
        overflow: hidden;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }
      #scene-container {
        position: fixed;
        inset: 0;
      }
      #scene-container canvas {
        display: block;
      }
      .overlay {
        position: fixed;
        z-index: 10;
        pointer-events: none;
        user-select: none;
      }
      #wordmark {
        top: 22px;
        left: 26px;
        line-height: 1;
      }
      #wordmark .title {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 0.42em;
        color: #fff;
        text-shadow:
          0 0 12px var(--cyan),
          0 0 40px rgba(41, 243, 255, 0.5);
      }
      #wordmark .title .v {
        color: var(--magenta);
        text-shadow:
          0 0 12px var(--magenta),
          0 0 40px rgba(255, 61, 242, 0.5);
      }
      #wordmark .sub {
        margin-top: 8px;
        font-size: 11px;
        letter-spacing: 0.34em;
        color: rgba(255, 255, 255, 0.55);
      }
      #hint {
        bottom: 20px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 12px;
        letter-spacing: 0.18em;
        color: rgba(255, 255, 255, 0.45);
      }
      #loading {
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: var(--ink);
        transition: opacity 0.8s ease;
      }
      #loading.done {
        opacity: 0;
      }
      #loading .bar {
        width: 180px;
        height: 2px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
      }
      #loading .bar::after {
        content: '';
        display: block;
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, var(--cyan), var(--magenta));
        animation: scan 1.1s ease-in-out infinite alternate;
      }
      @keyframes scan {
        from {
          transform: translateX(-40%);
        }
        to {
          transform: translateX(250%);
        }
      }
      #loading .label {
        font-size: 12px;
        letter-spacing: 0.5em;
        color: rgba(255, 255, 255, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="scene-container"></div>
    <div class="overlay" id="wordmark">
      <div class="title">D<span class="v">O</span>WN</div>
      <div class="sub">VR DESCENT &middot; REMASTERED</div>
    </div>
    <div class="overlay" id="hint">
      BEST IN VR &middot; CLEAR A 2M &times; 2M SPACE &middot; DESKTOP = SPECTATOR MODE
    </div>
    <div class="overlay" id="loading">
      <div class="label">DROPPING IN</div>
      <div class="bar"></div>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
