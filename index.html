<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta
      name="description"
      content="DOWN — a VR descent game for the immersive web. Dodge, drop, survive."
    />
    <title>DOWN — VR Descent</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23030308'/%3E%3Cpath d='M16 26 6 14h6V6h8v8h6z' fill='none' stroke='%2329f3ff' stroke-width='2'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        --cyan: #29f3ff;
        --magenta: #ff3df2;
        --ink: #030308;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--ink);
        overflow: hidden;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }
      #scene-container {
        position: fixed;
        inset: 0;
      }
      #scene-container canvas {
        display: block;
      }
      .overlay {
        position: fixed;
        z-index: 10;
        pointer-events: none;
        user-select: none;
      }
      /* Small corner logo shown during play */
      #wordmark {
        top: 20px;
        left: 24px;
      }
      #wordmark img {
        width: 150px;
        opacity: 0.9;
        filter: drop-shadow(0 0 10px rgba(41, 243, 255, 0.35));
      }
      #hint {
        bottom: 20px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 12px;
        letter-spacing: 0.18em;
        color: rgba(255, 255, 255, 0.45);
      }

      /* --- 2D intro / landing page --- */
      #intro {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        pointer-events: auto;
        /* Fully opaque — the game must not show behind the intro. */
        background:
          radial-gradient(ellipse at 50% 40%, #1c0730 0%, #08040f 55%, #030308 100%);
        transition: opacity 0.6s ease;
      }
      #intro.gone {
        opacity: 0;
        pointer-events: none;
      }
      #intro .logo {
        width: min(64vw, 620px);
        max-height: 42vh;
        object-fit: contain;
        filter: drop-shadow(0 0 30px rgba(41, 243, 255, 0.35))
          drop-shadow(0 0 60px rgba(255, 61, 242, 0.25));
        animation: floaty 5s ease-in-out infinite;
      }
      @keyframes floaty {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      #intro .tagline {
        font-size: 13px;
        letter-spacing: 0.42em;
        color: rgba(255, 255, 255, 0.62);
        margin-top: 4px;
        text-transform: uppercase;
      }
      #intro .buttons {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        margin-top: 34px;
      }
      #intro button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        font-weight: 800;
        letter-spacing: 0.24em;
        transition:
          transform 0.12s ease,
          box-shadow 0.2s ease,
          background 0.2s ease;
      }
      #enter-vr {
        padding: 18px 54px;
        font-size: 21px;
        color: #03060a;
        background: linear-gradient(90deg, var(--cyan), #7defff);
        box-shadow:
          0 0 22px rgba(41, 243, 255, 0.55),
          0 0 60px rgba(41, 243, 255, 0.25);
      }
      #enter-vr:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow:
          0 0 30px rgba(41, 243, 255, 0.8),
          0 0 80px rgba(41, 243, 255, 0.4);
      }
      #enter-vr.disabled {
        background: #1a1a26;
        color: rgba(255, 255, 255, 0.4);
        box-shadow: none;
        cursor: not-allowed;
      }
      #play-browser {
        padding: 11px 30px;
        font-size: 13px;
        color: var(--magenta);
        background: transparent;
        border: 1px solid rgba(255, 61, 242, 0.5);
      }
      #play-browser:hover {
        background: rgba(255, 61, 242, 0.12);
        transform: translateY(-1px);
      }
      #vr-status {
        margin-top: 20px;
        font-size: 11px;
        letter-spacing: 0.22em;
        color: rgba(255, 255, 255, 0.4);
        min-height: 14px;
        text-transform: uppercase;
        text-align: center;
        padding: 0 20px;
      }

      /* --- loading --- */
      #loading {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: var(--ink);
        transition: opacity 0.6s ease;
      }
      #loading.done {
        opacity: 0;
        pointer-events: none;
      }
      #loading .bar {
        width: 180px;
        height: 2px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
      }
      #loading .bar::after {
        content: '';
        display: block;
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, var(--cyan), var(--magenta));
        animation: scan 1.1s ease-in-out infinite alternate;
      }
      @keyframes scan {
        from {
          transform: translateX(-40%);
        }
        to {
          transform: translateX(250%);
        }
      }
      #loading .label {
        font-size: 12px;
        letter-spacing: 0.5em;
        color: rgba(255, 255, 255, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="scene-container"></div>

    <div class="overlay" id="wordmark" hidden>
      <img src="./textures/down-logo.png" alt="DOWN" />
    </div>

    <div class="overlay" id="hint" hidden>
      BEST IN VR &middot; CLEAR A 2M &times; 2M SPACE &middot; DESKTOP = SPECTATOR MODE
    </div>

    <div id="intro" hidden>
      <img class="logo" src="./textures/down-logo.png" alt="DOWN" />
      <div class="tagline">A Descent Through the Neon Void</div>
      <div class="buttons">
        <button id="enter-vr">ENTER VR</button>
        <button id="play-browser">PREVIEW IN BROWSER</button>
      </div>
      <div id="vr-status">Checking for a headset&hellip;</div>
    </div>

    <div id="loading">
      <div class="label">DROPPING IN</div>
      <div class="bar"></div>
    </div>

    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
